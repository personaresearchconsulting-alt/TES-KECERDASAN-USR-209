<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>LATIHAN TES KECERDASAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0b2340; --gold: #d4a017; --dark-bg: #071130; --light-gray: #f1f5f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark-bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { width: 90%; max-width: 400px; background: #fff; color: var(--navy); padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); text-align: center; border-top: 10px solid var(--gold); }
        .brand { font-weight: 900; font-size: 14px; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        h1 { font-size: 18px; font-weight: 900; margin-bottom: 5px; color: var(--navy); line-height: 1.3; }
        p { font-size: 13px; color: #64748b; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-access { width: 100%; padding: 16px; background: var(--navy); color: var(--gold); border: none; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .menu-area { display: none; margin-top: 10px; }
        .btn-menu { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 18px; margin-bottom: 12px; background: var(--light-gray); color: var(--navy); text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 13px; border-left: 6px solid var(--gold); box-sizing: border-box; text-align: left; }
        .status-msg { font-size: 12px; margin-top: 15px; color: #dc2626; font-weight: bold; }
        .info-tag { font-size: 10px; color: #94a3b8; margin-top: 20px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="authSection">
        <div class="brand">persona.research.id</div>
        <h1>LATIHAN TES KECERDASAN</h1>
        <p>Silakan masukkan password akses</p>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passInput" placeholder="Masukkan Password" autocomplete="off">
        </div>
        <button class="btn-access" onclick="handleAuth()">MASUK</button>
        <div id="errorMsg" class="status-msg"></div>
    </div>

    <div id="menuSection" class="menu-area">
        <div class="brand">persona.research.id</div>
        <h1>MENU UTAMA</h1>
        <p>Pilih paket simulasi Anda:</p>
        <a href="kecerdasan1.html" class="btn-menu"><span>1. TES KECERDASAN PAKET 1</span> ➔</a>
        <a href="tesverbal2fix.html.html" class="btn-menu"><span>2. TES VERBAL (KECERDASAN 2)</span> ➔</a>
        <div id="expiryInfo" class="info-tag"></div>
    </div>
</div>

<script>
    const CONFIG = {
        pass: "170408", // <--- INI PASSWORDNYA
        maxDevices: 2,
        expiryDays: 7
    };

    function handleAuth() {
        const input = document.getElementById('passInput').value;
        const error = document.getElementById('errorMsg');
        
        if (input !== CONFIG.pass) {
            error.textContent = "PASSWORD SALAH!";
            return;
        }

        let devices = JSON.parse(localStorage.getItem('prc_v5_devs') || "[]");
        let currentId = localStorage.getItem('prc_v5_id');

        if (!currentId) {
            if (devices.length < CONFIG.maxDevices) {
                currentId = 'ID-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('prc_v5_id', currentId);
                devices.push(currentId);
                localStorage.setItem('prc_v5_devs', JSON.stringify(devices));

                if (devices.length === CONFIG.maxDevices) {
                    const expiryDate = new Date().getTime() + (CONFIG.expiryDays * 24 * 60 * 60 * 1000);
                    localStorage.setItem('prc_v5_expiry', expiryDate);
                }
            } else {
                error.textContent = "AKSES DITOLAK: MAKSIMAL 2 PERANGKAT!";
                return;
            }
        }

        const expiry = localStorage.getItem('prc_v5_expiry');
        if (expiry && new Date().getTime() > parseInt(expiry)) {
            error.textContent = "MASA AKTIF (1 MINGGU) TELAH HABIS!";
            return;
        }

        showMenu();
    }

    function showMenu() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('menuSection').style.display = 'block';
        const expiry = localStorage.getItem('prc_v5_expiry');
        const info = document.getElementById('expiryInfo');
        if (expiry) {
            const date = new Date(parseInt(expiry)).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            info.textContent = "MASA AKTIF HINGGA: " + date;
        } else {
            info.textContent = "STATUS: MENUNGGU PERANGKAT KE-2 UNTUK MULAI HITUNG MUNDUR";
        }
    }
</script>
</body>
</html>
