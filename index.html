<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>LATIHAN TES KECERDASAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --dark-bg: #071130;
            --light-gray: #f1f5f9;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container-card {
            width: 90%;
            max-width: 400px;
            background: #fff;
            color: var(--navy);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            text-align: center;
            border-top: 10px solid var(--gold);
        }
        .brand { font-weight: 900; font-size: 14px; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        h1 { font-size: 18px; font-weight: 900; margin-bottom: 5px; color: var(--navy); line-height: 1.3; }
        p { font-size: 13px; color: #64748b; margin-bottom: 25px; }
        
        .menu-area { margin-top: 10px; }
        .btn-menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            background: var(--light-gray);
            color: var(--navy);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            border-left: 6px solid var(--gold);
            transition: 0.2s;
            box-sizing: border-box;
            text-align: left;
        }
        .btn-menu:hover { background: #e2e8f0; transform: translateX(5px); }
        .error-msg { font-size: 14px; color: #dc2626; font-weight: bold; padding: 20px; }
        .info-tag { font-size: 10px; color: #94a3b8; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container-card">
    <div id="contentArea">
        <div class="brand">persona.research.id</div>
        <h1>LATIHAN TES KECERDASAN</h1>
        <p>Pilih paket simulasi di bawah ini:</p>
        
        <div class="menu-area">
            <a href="kecerdasan1.html" class="btn-menu"><span>1. TES KECERDASAN PAKET 1</span> ➔</a>
            <a href="tesverbal2fix.html.html" class="btn-menu"><span>2. TES VERBAL (KECERDASAN 2)</span> ➔</a>
        </div>
        
        <div id="expiryInfo" class="info-tag"></div>
    </div>
    
    <div id="lockArea" style="display:none;">
        <div class="brand">persona.research.id</div>
        <div class="error-msg" id="lockMessage"></div>
    </div>
</div>

<script>
    const CONFIG = {
        maxDevices: 2,
        expiryDays: 7
    };

    function checkAccess() {
        const content = document.getElementById('contentArea');
        const lock = document.getElementById('lockArea');
        const msg = document.getElementById('lockMessage');
        const info = document.getElementById('expiryInfo');

        let devices = JSON.parse(localStorage.getItem('prc_v4_devs') || "[]");
        let currentId = localStorage.getItem('prc_v4_id');

        // 1. Registrasi Device
        if (!currentId) {
            if (devices.length < CONFIG.maxDevices) {
                currentId = 'ID-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('prc_v4_id', currentId);
                devices.push(currentId);
                localStorage.setItem('prc_v4_devs', JSON.stringify(devices));

                // Jika ini adalah device ke-2, set masa aktif 7 hari mulai sekarang
                if (devices.length === CONFIG.maxDevices) {
                    const expiryDate = new Date().getTime() + (CONFIG.expiryDays * 24 * 60 * 60 * 1000);
                    localStorage.setItem('prc_v4_expiry', expiryDate);
                }
            } else {
                content.style.display = 'none';
                lock.style.display = 'block';
                msg.textContent = "AKSES DITOLAK: Batas maksimal 2 perangkat telah tercapai.";
                return;
            }
        }

        // 2. Cek Masa Aktif
        const expiry = localStorage.getItem('prc_v4_expiry');
        if (expiry) {
            const now = new Date().getTime();
            if (now > parseInt(expiry)) {
                content.style.display = 'none';
                lock.style.display = 'block';
                msg.textContent = "AKSES BERAKHIR: Masa aktif 1 minggu Anda telah habis.";
                return;
            }
            
            const date = new Date(parseInt(expiry)).toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            info.textContent = "MASA AKTIF HINGGA: " + date;
        } else {
            info.textContent = "STATUS: MENUNGGU AKTIVASI PERANGKAT KE-2";
        }
    }

    window.onload = checkAccess;
</script>

</body>
</html>
